name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true

jobs:
  check-release:
    name: Check for new release
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
      should-release: ${{ steps.get-tag.outputs.should-release }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get latest release tag
        id: get-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "should-release=true" >> "$GITHUB_OUTPUT"
          else
            # Get the latest tag pointing at HEAD
            TAG=$(git tag --points-at HEAD | grep '^v' | head -n 1)
            if [ -n "$TAG" ]; then
              echo "tag=$TAG" >> "$GITHUB_OUTPUT"
              echo "should-release=true" >> "$GITHUB_OUTPUT"
            else
              echo "should-release=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  build-macos:
    name: Build macOS
    needs: check-release
    if: needs.check-release.outputs.should-release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.check-release.outputs.tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workdir: src-tauri

      - name: Install Node dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build
        env:
          # Optional: set these secrets in GitHub repo settings for updater signing
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: BrowseIt-macOS
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
          if-no-files-found: warn

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-release.outputs.tag }}
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
          generate_release_notes: true
          draft: true
